<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logged Out - Merite WiFi</title>
    <link href="styles.css" rel="stylesheet" type="text/css" />
    <script language="JavaScript">
        function openLogin() {
            if (window.name != 'hotspot_logout') return true;
            open('$(link-login)', '_blank', '');
            window.close();
            return false;
        }
    </script>
</head>

<body>
    <div class="app-wrapper">
        <div class="bg-glow"></div>

        <div class="main-content">
            <div class="container animate-fade-in-up">

                <!-- Status Header -->
                <div class="status-header">
                    <div class="header-icon" style="color: #ff4444;">
                        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </div>
                    <br>
                    <h1 class="header-title">You have Disconnected</h1>
                    <p class="status-ip" style="margin-top: 10px; color: #888;">Session Ended</p>
                </div>

                <!-- Connection Details -->
                <div class="stats-grid">
                    <!-- Duration -->
                    <div class="stat-card">
                        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <div class="stat-label">Duration</div>
                        <div class="stat-value">$(uptime)</div>
                    </div>

                    <!-- Download -->
                    <div class="stat-card">
                        <svg class="stat-icon accent" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        <div class="stat-label">Down</div>
                        <div class="stat-value accent">$(bytes-out-nice)</div>
                    </div>

                    <!-- Upload -->
                    <div class="stat-card">
                        <svg class="stat-icon accent" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <div class="stat-label">Up</div>
                        <div class="stat-value accent">$(bytes-in-nice)</div>
                    </div>
                </div>

                <div class="text-center">
                    <div class="session-id" style="margin-bottom: 20px;">
                        User: $(username) | IP: $(ip)<br>
                        Remaining: $(session-time-left)
                    </div>

                    <form action="$(link-login)" name="login" onSubmit="return openLogin()">
                        <button type="submit" class="btn-primary"
                            style="width: 100%; max-width: 400px; margin: 0 auto;">
                            LOG IN AGAIN
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
