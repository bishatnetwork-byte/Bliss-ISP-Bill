<!DOCTYPE html>
<html lang="en">
<head>
    <title>WiFi Error</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
                </svg>
            </div>
            <h1>LUCO WiFi</h1>
        </header>

        <main class="main-content">
            <section class="voucher-section">
                <h2>Connection Error</h2>
                
                <div class="error-message" style="margin: 30px 0;">
                    $(error)
                </div>

                <a href="$(link-login)" class="connect-btn" style="display:inline-block; text-align:center; text-decoration:none; color:black;">Return to Login</a>
            </section>
        </main>
    </div>

    <footer class="footer">
        <p>Need Help?</p>
        <a href="tel:+256708215305">+256708215305</a>
    </footer>
</body>
</html>
