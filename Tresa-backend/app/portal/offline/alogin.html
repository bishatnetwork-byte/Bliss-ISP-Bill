<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="-1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>__ROUTER_NAME__ | Connected</title>
  <link rel="stylesheet" href="portal.css">
  $(if popup == 'true')<meta http-equiv="refresh" content="2; url=$(link-redirect)">$(endif)
</head>
<body>
  <main class="portal-card">
    <header class="portal-head"><h1>Connected</h1><p>Your voucher was accepted.</p></header>
    <section class="portal-body">
      <h2>Welcome online</h2>
      <p>This device will automatically reuse the saved voucher when the hotspot requests login again.</p>
      <a class="portal-button" href="$(link-redirect)">Continue online</a>
      <a class="portal-button secondary" href="$(link-status)">Connection status</a>
    </section>
  </main>
</body>
</html>
