<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Voucher error</title><link rel="stylesheet" href="portal.css"></head>
<body>
  <main class="portal-card">
    <header class="portal-head"><h1>Voucher not accepted</h1><p>Please check the code and try again.</p></header>
    <section class="portal-body"><h2 class="error-text">$(error)</h2><p>Ask the voucher seller for help if the code has expired or is already in use.</p><a class="portal-button" href="$(link-login)">Back to voucher login</a></section>
  </main>
</body>
</html>
