<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="-1" />
    <title>Renult Campus WiFi - Error</title>
    <link rel="stylesheet" href="./portal.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="brand-mark">R</div>
        <p class="eyebrow">Hotspot error</p>
        <h1>Could not connect</h1>
        <p class="hero-copy">Check your voucher code or ask support to verify the package.</p>
      </section>
      <section class="panel">
        <div class="notice error">$(error)</div>
        <a href="$(link-login)">Return to connect</a>
      </section>
    </main>
  </body>
</html>
