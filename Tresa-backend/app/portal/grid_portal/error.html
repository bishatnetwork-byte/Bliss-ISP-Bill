<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="-1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff6000">
  <title>Renault WIFI | Error</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <main class="portal-card">
    <header class="portal-head">
      <div class="portal-mark"></div>
      <h1>Renault WIFI</h1>
      <p>We could not complete that request.</p>
    </header>
    <section class="portal-body">
      <h2 class="error-text">$(error)</h2>
      <p>Please return to the login page and try again.</p>
      <a class="portal-button" href="$(link-login)">Back to login</a>
    </section>
  </main>
</body>
</html>
