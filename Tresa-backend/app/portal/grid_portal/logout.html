<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="pragma" content="no-cache">
  <meta http-equiv="expires" content="-1">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff6000">
  <title>Renault WIFI | Disconnected</title>
  <link rel="stylesheet" href="portal.css">
</head>
<body>
  <main class="portal-card">
    <header class="portal-head">
      <div class="portal-mark"></div>
      <h1>Renault WIFI</h1>
      <p>Your session has ended.</p>
    </header>
    <section class="portal-body">
      <h2>Disconnected</h2>
      <p>Thank you for using Renault WIFI.</p>
      <a class="portal-button" href="$(link-login)">Connect again</a>
    </section>
  </main>
  <script>
    try {
      localStorage.removeItem('voucher-attempt-username');
      localStorage.removeItem('voucher-attempt-mode');
    } catch (e) { }
  </script>
</body>
</html>
