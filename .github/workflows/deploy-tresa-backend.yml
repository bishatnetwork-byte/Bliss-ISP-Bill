name: Build and Deploy Tresa Backend to VPS

# Required repo secrets:
#   VPS_IP        - VPS public IP / hostname
#   VPS_USER      - SSH user (e.g. root)
#   VPS_PASSWORD  - SSH password
#   VPS_PORT      - SSH port (optional, defaults to 22)
#   ENV_FILE      - full contents of the production .env file (paste the
#                   whole file as a multi-line secret). This is written to
#                   /opt/tresa-backend/.env on every deploy and loaded into
#                   the container via --env-file.
#
# This VPS is separate from the MikroTik CHR (23.92.30.38). The backend only
# makes OUTBOUND calls to the CHR (RouterOS API on 51847, NAT'd router ports
# in 49152-65534) so none of the router-facing ports (winbox 8291, MikroTik
# API 8728, L2TP/IPsec 1701+500+4500, etc.) need to be opened here - those
# belong to the CHR's own firewall/NAT rules.

on:
  push:
    branches: ["main"]
    paths:
      - "Tresa-backend/**"
      - ".github/workflows/deploy-tresa-backend.yml"
  workflow_dispatch:

env:
  REMOTE_DIR: /opt/tresa-backend
  CONTAINER_NAME: tresa-backend
  IMAGE_NAME: tresa-backend:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy backend files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "Tresa-backend/Dockerfile,Tresa-backend/.dockerignore,Tresa-backend/pyproject.toml,Tresa-backend/uv.lock,Tresa-backend/main.py,Tresa-backend/app"
          target: ${{ env.REMOTE_DIR }}
          strip_components: 1

      - name: Write production .env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: REMOTE_DIR
          script: |
            mkdir -p "$REMOTE_DIR"
            cat > "$REMOTE_DIR/.env" << '__ENV_FILE_EOF__'
            ${{ secrets.ENV_FILE }}
            __ENV_FILE_EOF__

            # Normalize: strip CRLF line endings and collapse stray spaces
            # around '=' (docker --env-file rejects "KEY = value").
            sed -i -e 's/\r$//' \
                -e '/^[[:space:]]*#/!s/^[[:space:]]*\([A-Za-z_][A-Za-z0-9_]*\)[[:space:]]*=[[:space:]]*/\1=/' \
                "$REMOTE_DIR/.env"

            chmod 600 "$REMOTE_DIR/.env"

      - name: Ensure Docker is installed
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable --now docker
            fi
            docker version

      - name: Build and run container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: REMOTE_DIR,CONTAINER_NAME,IMAGE_NAME
          script: |
            set -e
            cd "$REMOTE_DIR"

            echo "Building image..."
            DOCKER_BUILDKIT=1 docker build -t "$IMAGE_NAME" .

            echo "Restarting container..."
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            # Bound to localhost only - Nginx proxies 443 -> 8000
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart always \
              -p 127.0.0.1:8000:8000 \
              --env-file .env \
              "$IMAGE_NAME"

            docker image prune -f

            echo "Waiting for health check..."
            for i in $(seq 1 15); do
              if curl -sf http://127.0.0.1:8000/health > /dev/null; then
                echo "Backend is healthy"
                exit 0
              fi
              sleep 2
            done

            echo "Backend failed health check - last logs:"
            docker logs --tail 100 "$CONTAINER_NAME"
            exit 1

      - name: Configure Nginx reverse proxy for api.renult.xyz
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "Setting up Nginx reverse proxy..."

            if ! command -v nginx &> /dev/null; then
              apt-get update && apt-get install -y nginx ssl-cert
            fi

            mkdir -p /etc/nginx/snippets

            # CORS + proxy tuning lives in its own snippet, `include`d from
            # the `location /` block below, and is rewritten on every
            # deploy - so config fixes land here without touching certbot's
            # SSL block in sites-available/api.renult.xyz.
            #
            # CORS: FastAPI already sets allow_origins=["*"] +
            # allow_credentials, which Starlette implements by reflecting the
            # request's Origin back. Mirror that here too, with `always` so
            # it also applies to error pages Nginx generates itself (502,
            # 504, 413, etc. - which never reach FastAPI's CORSMiddleware).
            # Without `always`, those show up in the browser as a misleading
            # "CORS policy: No Access-Control-Allow-Origin" error instead of
            # the real HTTP status.
            cat > /etc/nginx/snippets/tresa-api.conf << 'PROXY_CONF'
            # FastAPI's own CORSMiddleware already sets these same headers on
            # proxied responses. If Nginx adds its own on top without
            # stripping FastAPI's first, the browser sees the header TWICE
            # (e.g. "Access-Control-Allow-Origin: https://app.renult.xyz,
            # https://app.renult.xyz") and rejects it outright. Make Nginx
            # the single source of truth by hiding upstream's copies first.
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;
            proxy_hide_header Access-Control-Allow-Credentials;
            proxy_hide_header Vary;

            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Vary' 'Origin, Access-Control-Request-Method, Access-Control-Request-Headers' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' $http_access_control_request_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 86400 always;
                add_header 'Vary' 'Origin, Access-Control-Request-Method, Access-Control-Request-Headers' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain';
                return 204;
            }

            # Captive-portal logo/asset uploads can exceed Nginx's 1m
            # default - match the backend's UPLOAD_MAX_BYTES (20 MiB) with
            # headroom, otherwise Nginx itself rejects the upload with a
            # CORS-less 413 before it ever reaches FastAPI.
            client_max_body_size 25m;

            # Voucher fetches and other router-facing calls go out over the
            # CHR VPN tunnel to the customer's MikroTik and can take a
            # while. Give them more headroom than Nginx's 60s defaults so a
            # slow router produces a real response/timeout from FastAPI
            # instead of Nginx dropping the connection (which the browser
            # reports as a CORS error with no status code).
            proxy_connect_timeout 75s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            PROXY_CONF

            # Only write the full server block if SSL is not already
            # configured - this prevents overwriting a working
            # certbot/Let's Encrypt config. Either way, the `location /`
            # block ends up as a single `include` of the snippet above.
            if ! grep -q "listen 443 ssl" /etc/nginx/sites-available/api.renult.xyz 2>/dev/null; then
              echo "Writing Nginx config with SSL..."
              cat > /etc/nginx/sites-available/api.renult.xyz << 'NGINX_CONF'
            server {
                listen 80;
                listen 443 ssl;
                server_name api.renult.xyz;

                ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
                ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

                location / {
                    include /etc/nginx/snippets/tresa-api.conf;
                }
            }
            NGINX_CONF
              echo "Nginx config written"
            else
              echo "Nginx SSL config already exists - ensuring location / includes the proxy snippet..."
              cp /etc/nginx/sites-available/api.renult.xyz /etc/nginx/sites-available/api.renult.xyz.bak
              python3 - << 'PYEOF'
            path = "/etc/nginx/sites-available/api.renult.xyz"
            src = open(path).read()
            marker = "location / {"
            start = src.find(marker)
            if start == -1:
                print("WARNING: could not find 'location / {' in api.renult.xyz - leaving config untouched")
            elif "tresa-api.conf" in src:
                print("tresa-api.conf already included - no change")
            else:
                body_start = start + len(marker)
                depth = 1
                i = body_start
                while depth > 0:
                    if src[i] == "{":
                        depth += 1
                    elif src[i] == "}":
                        depth -= 1
                    i += 1
                end = i - 1
                src = src[:body_start] + "\n        include /etc/nginx/snippets/tresa-api.conf;\n    " + src[end:]
                open(path, "w").write(src)
                print("Replaced location / body with include of tresa-api.conf")
            PYEOF

              if ! nginx -t; then
                echo "Nginx config invalid after update - restoring previous config"
                cp /etc/nginx/sites-available/api.renult.xyz.bak /etc/nginx/sites-available/api.renult.xyz
                nginx -t
                exit 1
              fi
            fi

            ln -sf /etc/nginx/sites-available/api.renult.xyz /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default

            # Move all traffic to the new api.renult.xyz subdomain - stop
            # serving the old api.pitbox.fun vhost (left on disk under
            # sites-available in case it's still needed for reference).
            rm -f /etc/nginx/sites-enabled/api.pitbox.fun

            nginx -t && systemctl reload nginx
            echo "Nginx configured for api.renult.xyz"

      - name: Configure firewall (UFW)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "Configuring firewall..."

            ufw default deny incoming
            ufw default allow outgoing

            ufw allow 22/tcp    # SSH
            ufw allow 80/tcp    # HTTP (Nginx, redirects/ACME)
            ufw allow 443/tcp   # HTTPS (Nginx -> backend)
            ufw deny 8000       # FastAPI is bound to 127.0.0.1 only; deny external access defensively

            # NOTE: this VPS does not host the MikroTik CHR, so the
            # router/VPN ports (8291 winbox, 8728 mikrotik api, 51847 CHR
            # api, 1701/500/4500 udp for L2TP+IPsec, etc. from the CHR's
            # firewall/NAT rules) are NOT opened here. The backend reaches
            # the CHR (23.92.30.38) via outbound connections, which UFW
            # allows by default.

            ufw --force enable
            ufw status verbose
            echo "Firewall configured!"
